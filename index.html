<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2° Logbook</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#caa24a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="2° Logbook" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>2° Logbook</h1>
      <p>Built on the water.</p>
    </div>
  </header>

  <nav class="nav-bar">
    <button data-nav="home">Home</button>
    <button data-nav="trip">Trip</button>
    <button data-nav="catch">Catch</button>
    <button data-nav="recommend">Recommend</button>
    <button data-nav="brain">Brain</button>
    <button data-nav="patterns">Patterns</button>
    <button data-nav="report">Report</button>
    <button data-nav="history">History</button>
    <button data-nav="stats">Stats</button>
    <button data-nav="baits">Baits</button>
    <button data-nav="photos">Photos</button>
  </nav>

  <main>
    <section id="home" data-page class="page active">
      <div class="card hero">
        <h2>Current Trip</h2>
        <p id="currentTripStatus">No active trip</p>
      </div>

      <div class="grid">
        <div class="card"><span>Total Fish</span><strong id="totalFish">0</strong></div>
        <div class="card"><span>Biggest</span><strong id="biggestFish">None</strong></div>
        <div class="card"><span>Average</span><strong id="averageWeight">0.00</strong></div>
        <div class="card"><span>Confidence</span><strong id="confidenceBait">No data</strong></div>
      </div>

      <div id="homeRecommendationCard" class="card"></div>
      <div id="homeBrainCard" class="card"></div>
      <div id="homePatternCard" class="card"></div>

      <button class="primary" data-nav="catch">Quick Catch</button>
      <button class="secondary" data-nav="recommend">What Should I Throw?</button>
      <button class="secondary" data-nav="brain">Fishing Brain</button>
      <button class="secondary" data-nav="trip">Start / Manage Trip</button>
    </section>

    <section id="trip" data-page class="page">
      <h2>Start Trip</h2>
      <form id="startTripForm" class="card form">
        <label>Lake / Spot<input id="tripLake" type="text" placeholder="Kunkel Lake" required /></label>
        <label>Weather
          <select id="tripWeather">
            <option>Sunny</option><option>Cloudy</option><option>Rain</option><option>Windy</option><option>Night</option>
          </select>
        </label>
        <label>Water Clarity
          <select id="tripWaterClarity">
            <option>Crystal Clear</option><option>Clear</option><option>Slight Stain</option><option>Stained</option><option>Muddy</option>
          </select>
        </label>
        <label>Water Temp<input id="tripWaterTemp" type="number" step="0.1" placeholder="Optional" /></label>
        <label>Wind<input id="tripWind" type="text" placeholder="SW 12 mph / calm / gusty" /></label>
        <label>Notes<textarea id="tripNotes" placeholder="What are you trying to learn?"></textarea></label>
        <button class="primary" type="submit">Start Trip</button>
      </form>
      <button id="endTripButton" class="danger">End Current Trip</button>
    </section>

    <section id="catch" data-page class="page">
      <h2>Quick Catch</h2>
      <form id="catchForm" class="card form">
        <label>Bait<select id="catchBait"></select></label>
        <label>Color<select id="catchColor"></select></label>
        <label>Trailer<select id="catchTrailer"></select></label>
        <div class="two-col">
          <label>Weight<input id="catchWeight" type="number" step="0.01" placeholder="3.25" /></label>
          <label>Length<input id="catchLength" type="number" step="0.25" placeholder="18" /></label>
        </div>
        <label>Cover
          <select id="catchCover">
            <option>Grass</option><option>Riprap</option><option>Wood</option><option>Dock</option><option>Open Water</option><option>Shade</option><option>Other</option>
          </select>
        </label>
        <label>Depth<input id="catchDepth" type="number" step="0.5" placeholder="Optional" /></label>
        <label>Notes<textarea id="catchNotes" placeholder="What did the fish teach you?"></textarea></label>
        <label>Fish Photo<input id="catchPhoto" type="file" accept="image/*" capture="environment" /></label>
        <button id="useLocationButton" class="secondary" type="button">Use Current Location</button>
        <p id="locationStatus" class="small-text">Location not saved.</p>
        <button class="primary" type="submit">Save Catch</button>
      </form>
    </section>

    <section id="recommend" data-page class="page"><h2>What Should I Throw?</h2><div id="recommendationReport"></div></section>
    <section id="brain" data-page class="page"><h2>Fishing Brain</h2><div id="brainReport"></div></section>
    <section id="patterns" data-page class="page"><h2>Pattern Finder</h2><div id="patternReport"></div></section>
    <section id="report" data-page class="page"><h2>Trip Report</h2><div id="tripReport"></div></section>
    <section id="history" data-page class="page"><h2>Trip History</h2><div id="tripHistory"></div></section>
    <section id="stats" data-page class="page"><h2>Bait Stats</h2><div id="baitStats"></div></section>

    <section id="baits" data-page class="page">
      <h2>2° Baits Manager</h2>
      <form id="baitForm" class="card form">
        <label>Bait Name<input id="baitName" type="text" placeholder="Example: Workhorse" required /></label>
        <label>Colors<input id="baitColors" type="text" placeholder="Green Pumpkin, Black Blue, White" /></label>
        <label>Trailers<input id="baitTrailers" type="text" placeholder="Spunk Shad, Dangler, None" /></label>
        <label>Weights<input id="baitWeights" type="text" placeholder="3/8, 1/2" /></label>
        <label>Notes<textarea id="baitNotes" placeholder="What makes this bait special?"></textarea></label>
        <button class="primary" type="submit">Add Bait</button>
      </form>
      <div id="baitManagerList"></div>
    </section>

    <section id="photos" data-page class="page"><h2>Catch Photos</h2><div id="photoGallery"></div></section>
  </main>

  <script src="storage.js"></script>
  <script src="trips.js"></script>
  <script src="baits.js"></script>
  <script src="catches.js"></script>
  <script src="stats.js"></script>
  <script src="patterns.js"></script>
  <script src="reports.js"></script>
  <script src="recommendations.js"></script>
  <script src="brain.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
