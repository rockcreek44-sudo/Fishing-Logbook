<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Logbook</title><style>

body{margin:0;background:#090b09;color:#f3f1e8;font-family:-apple-system,Arial,sans-serif}header{padding:16px;border-bottom:1px solid #333}h1{margin:0}.sub{color:#aaa;font-size:13px}.card{background:#151a15;border:1px solid #333;border-radius:16px;padding:14px;margin:12px}button{background:#7f9b4e;border:0;border-radius:12px;padding:13px;font-weight:800;width:100%;margin:6px 0}input,textarea,select{width:100%;padding:10px;margin:6px 0 12px;background:#050705;color:white;border:1px solid #333;border-radius:10px;font-size:16px}.hide{display:none}.nav{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(4,1fr);background:#111;border-top:1px solid #333}.nav button{background:#111;color:#aaa;border-radius:0;font-size:12px}.pill{display:inline-block;border:1px solid #444;border-radius:999px;padding:5px 8px;margin:3px;color:#aaa;font-size:12px}</style></head><body>

<header><h1>🎣 THE LOGBOOK</h1><div class="sub">by 2° Baits · Every cast teaches something.</div></header>

<div id="home" class="card"><h2>Dashboard</h2><div id="stats"></div><h3>Chief's Report</h3><p id="chief">Save a trip and Chief will start finding patterns.</p></div>

<div id="trip" class="card hide"><h2>New Trip</h2>

<input id="date" type="date"><input id="lake" placeholder="Lake"><input id="spot" placeholder="Spot / area">

<input id="lure" placeholder="Lure"><input id="color" placeholder="Color"><input id="trailer" placeholder="Trailer">

<select id="clarity"><option>Clear</option><option>Gin clear</option><option>Stained</option><option>Muddy</option></select>

<select id="cover"><option>Grass</option><option>Riprap</option><option>Wood</option><option>Dock</option><option>Open water</option></select>

<input id="bites" type="number" value="0" placeholder="Bites"><input id="landed" type="number" value="0" placeholder="Landed"><input id="lost" type="number" value="0" placeholder="Lost">

<input id="confidence" type="number" value="8" min="1" max="10" placeholder="Confidence">

<textarea id="notes" placeholder="Notes / lesson learned"></textarea><button onclick="saveTrip()">Save Trip</button></div>

<div id="history" class="card hide"><h2>History</h2><div id="list"></div></div>

<div id="vault" class="card hide"><h2>Lure Vault</h2><input id="vname" placeholder="Lure name"><textarea id="vnotes" placeholder="Version notes"></textarea><button onclick="saveLure()">Save Lure</button><div id="lures"></div></div>

<div class="nav"><button onclick="show('home')">Home</button><button onclick="show('trip')">Trip</button><button onclick="show('history')">History</button><button onclick="show('vault')">Vault</button></div>

<script>

let db=JSON.parse(localStorage.logbook||'{"trips":[],"lures":[]}');date.valueAsDate=new Date();

function show(x){['home','trip','history','vault'].forEach(id=>document.getElementById(id).classList.add('hide'));document.getElementById(x).classList.remove('hide');render()}

function val(x){return document.getElementById(x).value}function num(x){return Number(val(x)||0)}

function save(){localStorage.logbook=JSON.stringify(db);render()}

function saveTrip(){db.trips.unshift({date:val('date'),lake:val('lake'),spot:val('spot'),lure:val('lure'),color:val('color'),trailer:val('trailer'),clarity:val('clarity'),cover:val('cover'),bites:num('bites'),landed:num('landed'),lost:num('lost'),confidence:num('confidence'),notes:val('notes')});save();alert('Trip saved');show('history')}

function saveLure(){db.lures.unshift({name:val('vname'),notes:val('vnotes')});save()}

function render(){let t=db.trips,b=t.reduce((a,x)=>a+x.bites,0),l=t.reduce((a,x)=>a+x.landed,0),lost=t.reduce((a,x)=>a+x.lost,0);stats.innerHTML=`Trips: <b>${t.length}</b><br>Bites: <b>${b}</b><br>Landed: <b>${l}</b><br>Lost: <b>${lost}</b>`;chief.innerHTML=t.length?`Best current data: <b>${t[0].lure||'No lure entered'}</b> at ${t[0].lake||'unknown lake'}.`:'Save a trip and Chief will start finding patterns.';list.innerHTML=t.map((x,i)=>`<div class=card><b>${x.date} - ${x.lake}</b><br><span class=pill>${x.lure}</span><span class=pill>${x.bites} bites</span><span class=pill>${x.landed} landed</span><p>${x.notes||''}</p></div>`).join('')||'No trips yet.';lures.innerHTML=db.lures.map(x=>`<div class=card><b>${x.name}</b><p>${x.notes}</p></div>`).join('')}

render();

</script></body></html>
