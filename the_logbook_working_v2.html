<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Logbook</title>
<style>
:root{--bg:#0d0f0d;--panel:#171b17;--panel2:#20261f;--line:#313931;--text:#f3f1e8;--muted:#a8b0a4;--green:#8fa760;--gold:#c6a15a;--red:#d86d61}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
header{padding:18px 16px 12px;border-bottom:1px solid var(--line);background:#0d0f0dee;position:sticky;top:0;z-index:2}
h1{font-size:25px;margin:0;letter-spacing:1px}.sub{color:var(--muted);font-size:13px;margin-top:4px}
main{padding:14px 14px 92px;max-width:740px;margin:auto}
.screen{display:none}.screen.active{display:block}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 8px 18px #0007}
h2,h3{margin:0 0 10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{width:100%;border:0;border-radius:15px;padding:14px 12px;background:var(--green);color:#10130f;font-weight:900;font-size:15px}
.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.danger{background:var(--red);color:#111}
label{display:block;color:var(--muted);font-size:13px;margin:10px 0 5px}
input,select,textarea{width:100%;border:1px solid var(--line);background:#0a0c0a;color:var(--text);border-radius:12px;padding:11px;font-size:16px}
textarea{min-height:86px}.stat{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid var(--line);padding:9px 0}.stat:last-child{border-bottom:0}
.pill{display:inline-block;border:1px solid var(--line);background:#101310;color:var(--muted);border-radius:999px;padding:6px 9px;margin:3px;font-size:12px}
.small{color:var(--muted);font-size:13px}.gold{color:var(--gold)}.spot{border-left:4px solid var(--green)}
nav{position:fixed;bottom:0;left:0;right:0;background:#101310f2;display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--line);z-index:4}
nav button{background:transparent;color:var(--muted);border-radius:0;font-size:11px;padding:10px 2px} nav button.on{color:var(--gold)}
</style>
</head>
<body>
<header><h1>THE LOGBOOK</h1><div class="sub">Every cast teaches something.</div></header>
<main>
<section id="home" class="screen active">
  <div class="card"><h2>Dashboard</h2><div id="dashboard"></div></div>
  <div class="grid">
    <button data-go="trip">🎣 Start Trip</button>
    <button class="secondary" data-go="patterns">📍 Pattern Map</button>
    <button class="secondary" data-go="vault">🎒 Lure Vault</button>
    <button class="secondary" data-go="performance">📈 Performance</button>
  </div>
  <div class="card"><h3>Chief's Report</h3><div id="chief" class="small">No trips yet.</div></div>
</section>

<section id="trip" class="screen">
  <div class="card"><h2>Start Trip</h2>
    <label>Date</label><input id="date" type="date">
    <label>Body of Water</label><input id="lake" placeholder="Kunkel Lake">
    <label>Spot / Area</label><input id="spot" placeholder="East riprap / north grass flat">
    <div class="row"><div><label>Water Clarity</label><select id="clarity"><option>Clear</option><option>Gin clear</option><option>Stained</option><option>Muddy</option></select></div><div><label>Cover</label><select id="cover"><option>Grass</option><option>Riprap</option><option>Wood</option><option>Dock</option><option>Open water</option><option>Mixed</option></select></div></div>
    <label>Grass Type</label><select id="grass"><option>None</option><option>Hydrilla</option><option>Milfoil</option><option>Coontail</option><option>Mixed</option></select>
    <h3>Lure Setup</h3>
    <label>Lure</label><input id="lure" placeholder="Mini">
    <div class="row"><div><label>Weight</label><input id="weight" placeholder="3/8 oz"></div><div><label>Color</label><input id="color" placeholder="Green pumpkin"></div></div>
    <div class="row"><div><label>Trailer</label><input id="trailer" placeholder="3.5 Icon"></div><div><label>Blade</label><input id="blade" placeholder="Small coffin"></div></div>
    <div class="row"><div><label>Rod</label><input id="rod" placeholder="Lew's TP3"></div><div><label>Line</label><input id="line" placeholder="15 lb fluoro"></div></div>
    <h3>Results</h3>
    <div class="row"><div><label>Bites</label><input id="bites" type="number" value="0"></div><div><label>Landed</label><input id="landed" type="number" value="0"></div></div>
    <div class="row"><div><label>Lost</label><input id="lost" type="number" value="0"></div><div><label>Biggest</label><input id="biggest" placeholder="2.4 lb"></div></div>
    <h3>Performance</h3>
    <div class="row"><div><label>Confidence</label><input id="confidence" type="number" min="1" max="10" value="8"></div><div><label>Grass Clearance</label><input id="grassScore" type="number" min="1" max="10" value="8"></div></div>
    <div class="row"><div><label>Hookups</label><input id="hookups" type="number" min="1" max="10" value="8"></div><div><label>Action / Hunt</label><input id="hunting" type="number" min="1" max="10" value="8"></div></div>
    <label><input id="fishAgain" type="checkbox" checked style="width:auto"> Would fish this exact setup again</label>
    <label>Lesson Learned</label><input id="lesson" placeholder="What did this trip teach you?">
    <label>Notes</label><textarea id="notes"></textarea>
    <button id="saveTrip">Save Trip</button>
  </div>
</section>

<section id="history" class="screen"><div class="card"><h2>History</h2><div id="historyList"></div></div></section>

<section id="performance" class="screen"><div class="card"><h2>Performance</h2><div id="performanceList"></div></div></section>

<section id="vault" class="screen">
  <div class="card"><h2>Lure Vault</h2>
    <label>Lure Name</label><input id="vName" placeholder="Mini">
    <label>Status</label><select id="vStatus"><option>Production</option><option>Prototype</option><option>Retired</option></select>
    <label>Notes / Version History</label><textarea id="vNotes" placeholder="Version notes, hook, blade, trailer keeper..."></textarea>
    <button id="saveLure">Save Lure</button>
  </div>
  <div class="card"><h3>Saved Lures</h3><div id="vaultList"></div></div>
</section>

<section id="patterns" class="screen">
  <div class="card spot"><h2>Pattern Map</h2><p class="small">Places each bait should excel on each body of water.</p>
    <label>Lake</label><input id="pLake" placeholder="Kunkel Lake">
    <label>Spot</label><input id="pSpot" placeholder="North weed flat">
    <div class="row"><div><label>Best Lure</label><input id="pBest" placeholder="Mini"></div><div><label>Backup Lure</label><input id="pBackup" placeholder="Workhorse"></div></div>
    <label>Why it should excel there</label><textarea id="pWhy" placeholder="Clear water, grass edge, pressured fish..."></textarea>
    <button id="savePattern">Save Pattern Spot</button>
  </div>
  <div class="card"><h3>Saved Spots</h3><div id="patternList"></div></div>
</section>

<section id="settings" class="screen">
  <div class="card"><h2>Backup</h2>
    <button id="exportBtn">Export Backup</button>
    <label>Paste Backup JSON</label><textarea id="importText"></textarea>
    <button class="secondary" id="importBtn">Import Backup</button>
    <button class="danger" id="clearBtn">Clear Everything</button>
  </div>
</section>
</main>

<nav>
<button class="on" data-go="home">Home</button>
<button data-go="trip">Trip</button>
<button data-go="history">History</button>
<button data-go="performance">Stats</button>
<button data-go="settings">Settings</button>
</nav>

<script>
const key='theLogbookWorkingV2';
let db=JSON.parse(localStorage.getItem(key)||'{"trips":[],"lures":[],"patterns":[]}');
document.getElementById('date').valueAsDate=new Date();

function save(){localStorage.setItem(key,JSON.stringify(db));render();}
function $(id){return document.getElementById(id)}
function value(id){return $(id).value.trim()}
function number(id){return Number($(id).value||0)}
function go(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 $(id).classList.add('active');
 document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.go===id));
 render();
}
document.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click',()=>go(b.dataset.go)));

$('saveTrip').addEventListener('click',()=>{
 db.trips.unshift({
 id:Date.now(),date:value('date'),lake:value('lake'),spot:value('spot'),clarity:value('clarity'),cover:value('cover'),grass:value('grass'),
 lure:value('lure'),weight:value('weight'),color:value('color'),trailer:value('trailer'),blade:value('blade'),rod:value('rod'),line:value('line'),
 bites:number('bites'),landed:number('landed'),lost:number('lost'),biggest:value('biggest'),confidence:number('confidence'),grassScore:number('grassScore'),hookups:number('hookups'),hunting:number('hunting'),
 fishAgain:$('fishAgain').checked,lesson:value('lesson'),notes:value('notes')
 });
 save(); alert('Trip saved.'); go('history');
});
$('saveLure').addEventListener('click',()=>{db.lures.unshift({id:Date.now(),name:value('vName'),status:value('vStatus'),notes:value('vNotes')});save();});
$('savePattern').addEventListener('click',()=>{db.patterns.unshift({id:Date.now(),lake:value('pLake'),spot:value('pSpot'),best:value('pBest'),backup:value('pBackup'),why:value('pWhy')});save();});
$('clearBtn').addEventListener('click',()=>{if(confirm('Delete all Logbook data?')){db={trips:[],lures:[],patterns:[]};save();}});
$('exportBtn').addEventListener('click',()=>{let blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='the-logbook-backup.json';a.click();});
$('importBtn').addEventListener('click',()=>{try{db=JSON.parse(value('importText'));save();alert('Backup imported.')}catch(e){alert('That backup did not import.')}});

function group(arr,prop){return arr.reduce((o,x)=>{let k=x[prop]||'Unknown';(o[k]=o[k]||[]).push(x);return o;},{})}
function avg(arr,prop){let vals=arr.map(x=>Number(x[prop]||0)).filter(Boolean);return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):'—'}
function sum(arr,prop){return arr.reduce((a,x)=>a+Number(x[prop]||0),0)}
function delTrip(id){db.trips=db.trips.filter(t=>t.id!==id);save();}
window.delTrip=delTrip;

function render(){
 let trips=db.trips,bites=sum(trips,'bites'),landed=sum(trips,'landed'),lost=sum(trips,'lost');
 $('dashboard').innerHTML=`<div class="stat"><span>Trips</span><b>${trips.length}</b></div><div class="stat"><span>Bites</span><b>${bites}</b></div><div class="stat"><span>Landed</span><b>${landed}</b></div><div class="stat"><span>Lost</span><b>${lost}</b></div>`;
 $('chief').innerHTML=chiefReport();
 $('historyList').innerHTML=trips.length?trips.map(t=>`<div class="card"><b>${t.date||''} — ${t.lake||'Unknown'}</b><br><span class="small">${t.spot||''}</span><p><span class="pill">${t.lure||'Lure'}</span><span class="pill">${t.bites} bites</span><span class="pill">${t.landed} landed</span><span class="pill">${t.lost} lost</span></p><p>${t.lesson||t.notes||''}</p><button class="danger" onclick="delTrip(${t.id})">Delete</button></div>`).join(''):'<p class="small">No trips saved yet.</p>';
 renderPerformance(); renderVault(); renderPatterns();
}
function chiefReport(){
 if(!db.trips.length)return 'Save your first trip and Chief will start finding patterns.';
 let by=group(db.trips,'lure');
 let best=Object.entries(by).sort((a,b)=>sum(b[1],'bites')-sum(a[1],'bites'))[0];
 let lessons=db.trips.map(t=>t.lesson).filter(Boolean).slice(0,3).map(x=>`<span class="pill">${x}</span>`).join('');
 return `Best lure by bites: <b class="gold">${best?best[0]:'—'}</b><br>${lessons||'Add lessons to sharpen the report.'}`;
}
function renderPerformance(){
 let by=group(db.trips,'lure');
 $('performanceList').innerHTML=Object.entries(by).length?Object.entries(by).map(([name,arr])=>{
 let b=sum(arr,'bites'),l=sum(arr,'landed'),rate=b?Math.round(l/b*100):0;
 return `<div class="card"><h3>${name}</h3><div class="stat"><span>Trips</span><b>${arr.length}</b></div><div class="stat"><span>Bites</span><b>${b}</b></div><div class="stat"><span>Landed</span><b>${l}</b></div><div class="stat"><span>Landing %</span><b>${rate}%</b></div><div class="stat"><span>Confidence</span><b>${avg(arr,'confidence')}</b></div><div class="stat"><span>Grass Clearance</span><b>${avg(arr,'grassScore')}</b></div><div class="stat"><span>Hookups</span><b>${avg(arr,'hookups')}</b></div><div class="stat"><span>Action / Hunt</span><b>${avg(arr,'hunting')}</b></div></div>`;
 }).join(''):'<p class="small">No performance data yet.</p>';
}
function renderVault(){
 $('vaultList').innerHTML=db.lures.length?db.lures.map(l=>`<div class="card"><b>${l.name}</b> <span class="pill">${l.status}</span><p>${l.notes||''}</p></div>`).join(''):'<p class="small">No lures saved yet.</p>';
}
function renderPatterns(){
 $('patternList').innerHTML=db.patterns.length?db.patterns.map(p=>`<div class="card spot"><b>${p.lake||'Lake'} — ${p.spot||'Spot'}</b><p><span class="pill">Best: ${p.best||'—'}</span><span class="pill">Backup: ${p.backup||'—'}</span></p><p>${p.why||''}</p></div>`).join(''):'<p class="small">No pattern spots yet.</p>';
}
render();
</script>
<script>
/* 2° Logbook Build 40.1 */
window.TwoDegreeAI = {
  recommend(c = {}) {
    let confidence = 62;
    const why = [];

    const clarity = (c.clarity || "clear").toLowerCase();
    const cover = (c.cover || "riprap").toLowerCase();
    const wind = (c.wind || "light").toLowerCase();

    let primary = "1/2 oz Green Pumpkin Workhorse";
    let backup = "Karashi around isolated grass";

    if (clarity.includes("clear")) {
      confidence += 12;
      why.push("Clear water favors green pumpkin and natural colors.");
    }

    if (cover.includes("riprap") || cover.includes("rock")) {
      confidence += 14;
      why.push("Riprap is a high-value reaction bait target.");
    }

    if (wind !== "calm") {
      confidence += 10;
      why.push("Wind helps the Workhorse get reaction bites.");
    }

    confidence = Math.min(confidence, 94);

    return {
      primary,
      backup,
      confidence,
      why,
      nextMove: "Give it 20 minutes. If they do not react, move to grass and fish the Karashi slower."
    };
  }
};

function renderBuild401Dashboard() {
  const result = window.TwoDegreeAI.recommend({
    clarity: "clear",
    cover: "riprap",
    wind: "light"
  });

  const panel = document.createElement("section");
  panel.className = "build401-card";
  panel.innerHTML = `
    <h2>🎣 2° AI Fishing Plan</h2>
    <div class="big-rec">${result.primary}</div>
    <div class="confidence">${result.confidence}% Confidence</div>
    <h3>Why</h3>
    <ul>${result.why.map(w => `<li>${w}</li>`).join("")}</ul>
    <h3>Backup</h3>
    <p>${result.backup}</p>
    <h3>Next Move</h3>
    <p>${result.nextMove}</p>
  `;

  const main = document.querySelector("main") || document.body;
  main.prepend(panel);
}

document.addEventListener("DOMContentLoaded", renderBuild401Dashboard);
</script>

<style>
.build401-card {
  background: linear-gradient(135deg, #111, #1e2b1e);
  color: white;
  border: 1px solid #2f5f2f;
  border-radius: 18px;
  padding: 18px;
  margin: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,.35);
}
.build401-card h2 {
  margin-top: 0;
}
.big-rec {
  font-size: 22px;
  font-weight: 900;
  color: #8faf60;
  margin: 10px 0;
}
.confidence {
  font-size: 18px;
  font-weight: 800;
}
.build401-card li {
  margin: 6px 0;
}
</style>
</body>
</html>
